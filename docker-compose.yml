services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./hf_models:/app/hf_models:ro
    environment:
      MODELS_DIR: /app/hf_models
      MAX_UPLOAD_BYTES: "52428800"
      CORS_ORIGINS: "*"
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      REDIS_URL: redis://redis:6379/0
      JURISPRO_QUEUE_BACKEND: celery
    depends_on:
      - redis
      - qdrant
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  worker:
    build: .
    command: celery -A api.worker.celery_app worker --loglevel=info
    volumes:
      - ./hf_models:/app/hf_models:ro
    environment:
      MODELS_DIR: /app/hf_models
      MAX_UPLOAD_BYTES: "52428800"
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      REDIS_URL: redis://redis:6379/0
      JURISPRO_QUEUE_BACKEND: celery
    depends_on:
      - redis
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data:
