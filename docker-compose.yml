services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./hf_models:/app/hf_models:ro
    environment:
      MODELS_DIR: /app/hf_models
      MAX_UPLOAD_BYTES: "52428800"
      CORS_ORIGINS: "*"
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
    depends_on:
      - rabbitmq
      - qdrant
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  worker:
    build: .
    command: python -m workers.rabbitmq_worker
    volumes:
      - ./hf_models:/app/hf_models:ro
    environment:
      MODELS_DIR: /app/hf_models
      MAX_UPLOAD_BYTES: "52428800"
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
    depends_on:
      - rabbitmq
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_data:
